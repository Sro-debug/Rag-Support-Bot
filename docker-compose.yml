version: "3.9"

services:
  # ─── Ollama (local LLM + embeddings) ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Pull required models on startup
  ollama-init:
    image: ollama/ollama:latest
    container_name: rag_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Pulling llama3...' &&
        ollama pull llama3 &&
        echo 'Pulling nomic-embed-text...' &&
        ollama pull nomic-embed-text &&
        echo 'All models ready.'
      "
    restart: "no"

  # ─── ChromaDB (vector store) ────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── Python RAG Microservice ────────────────────────────────────────────────
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: rag_python
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - CHROMA_URL=http://chromadb:8000
      - OLLAMA_URL=http://ollama:11434
      - CHAT_MODEL=${CHAT_MODEL:-llama3}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - COLLECTION_NAME=support_docs
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - TOP_K=5
      - MIN_SCORE=0.3
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─── TypeScript Express Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_backend
    depends_on:
      rag-service:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-supersecret-change-in-prod}
      - JWT_EXPIRES=24h
      - RAG_SERVICE_URL=http://rag-service:8080
      - UPLOAD_DIR=/app/uploads
      - FRONTEND_URL=http://localhost
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@support.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin1234}
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  uploads_data:
